port: 3000
defaults:
  runtime: tmux
  agent: cursor
  workspace: worktree
  notifiers: []
projects:
  indera-god:
    name: indera-god
    sessionPrefix: ig
    repo: Harry-0318/indera-god
    path: /Users/harshitsinghbhandari/Downloads/side-quests/indera-god
